# ob-builder config for the lab BACKENDS.
#
# client_id `pam-access` is mapped to the *backend* server group by the lab LLNG
# (see sso/configure.sh). `allowed_bastions` is left empty here and filled in by
# the harness at run time with the bastion_id returned by `ob-bastion-id` on the
# freshly deployed bastion — that is the whole point of the two-phase workflow.
deployment_slug: oblab
scenario: token-only
portal_url: http://auth.example.com
client_id: pam-access
client_id_policy: fixed
client_secret_mode: embedded
embedded_client_secret: pamsecret
server_group: backend
server_group_policy: fixed
target_role: backend
auto_enroll_setup: yes
ansible_auto_approve: yes
apt_url: http://192.168.122.1:8088
apt_suite: ./
apt_component: ""
allowed_bastions: ""
enable_hardening: no
enable_audit_trace: no
self_delete: no
