---
# Open Bastion lab deployment — single role driven by per-host vars.
# Scenario: token-only (Mode A). Roles dispatched via ob_role in inventory.
#
# ob_llng_cookie and ob_approve_* are passed at run time via --extra-vars
# (see local/ansible/README.md). The cookie auto-approves the device code.

- hosts: all
  become: true
  roles:
    - role: open-bastion
