---
# Open Bastion — main task entry point
# Auto-generated by ob-builder 0.2.3
# Scenario: token-only (Mode A) | Role: bastion

- name: Pre-checks
  ansible.builtin.assert:
    that:
      - ob_portal_url is defined and ob_portal_url | length > 0
      - ob_role in ['bastion', 'standalone', 'backend']
      - ob_pam_mode in ['A', 'B', 'C', 'D', 'E']
    fail_msg: >-
      Required variables are missing or invalid.
      Set ob_portal_url, ob_role (bastion|standalone|backend),
      and ob_pam_mode (A-E).

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - gnupg
      - curl
      - apt-transport-https
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Deploy APT keyring
  ansible.builtin.copy:
    src: open-bastion.gpg
    dest: /etc/apt/keyrings/open-bastion.gpg
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts['os_family'] == 'Debian'

- name: Deploy APT sources.list entry
  ansible.builtin.copy:
    content: "{{ ob_apt_sources_list_line }}\n"
    dest: /etc/apt/sources.list.d/open-bastion.list
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts['os_family'] == 'Debian'

# LAB POST-EDIT: the provided .deb is built against libsodium 1.0.20 (soname
# libsodium.so.26 / package libsodium26), but Debian 13 (trixie) ships
# libsodium 1.0.18 (libsodium.so.23 / package libsodium23). The libsodium 1.x
# ABI for the symbols the PAM module uses (sodium_init, sodium_memcmp,
# sodium_memzero, crypto_pwhash) is stable, so we install libsodium23 and add
# a libsodium.so.26 compatibility symlink, then install open-bastion's real
# runtime deps via apt and the package itself via dpkg (ignoring only the
# unsatisfiable libsodium26 package dependency).
- name: "LAB: install open-bastion runtime dependencies (excluding libsodium26)"
  ansible.builtin.apt:
    name:
      - libc6
      - libcurl4t64
      - libjson-c5
      - libsodium23
      - libssl3t64
      - libpam0g
      - curl
      - jq
      - nscd
      - locales
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: "LAB: discover the installed libsodium runtime"
  ansible.builtin.find:
    paths: /usr/lib/x86_64-linux-gnu
    patterns: 'libsodium.so.23*'
    file_type: any
  register: _ob_libsodium
  when: ansible_facts['os_family'] == 'Debian'

- name: "LAB: create libsodium.so.26 -> libsodium.so.23 compatibility symlink"
  ansible.builtin.file:
    src: libsodium.so.23
    dest: /usr/lib/x86_64-linux-gnu/libsodium.so.26
    state: link
    force: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - _ob_libsodium.matched | default(0) > 0

- name: "LAB: refresh the dynamic linker cache"
  ansible.builtin.command: ldconfig
  changed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: "LAB: download the open-bastion .deb from the flat repo"
  ansible.builtin.get_url:
    url: "http://192.168.122.1:8088/open-bastion_0.2.3_amd64.deb"
    dest: /tmp/open-bastion_0.2.3_amd64.deb
    mode: '0644'
    # The lab rebuilds the .deb without bumping the version; always re-fetch so
    # a stale /tmp copy from a previous play never masks the new build.
    force: true
  when: ansible_facts['os_family'] == 'Debian'

- name: "LAB: install open-bastion (force-depends to bypass the libsodium26 package name)"
  ansible.builtin.command:
    argv:
      - dpkg
      - -i
      - --force-depends
      - /tmp/open-bastion_0.2.3_amd64.deb
  register: _ob_dpkg
  changed_when: "'already installed' not in _ob_dpkg.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Create /etc/open-bastion directory
  ansible.builtin.file:
    path: /etc/open-bastion
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy SSH CA public key
  ansible.builtin.copy:
    src: open-bastion-ca.pub
    dest: /etc/ssh/open-bastion_ca.pub
    owner: root
    group: root
    mode: '0644'

# KRL (Key Revocation List) is mandatory in Mode E — certificate revocation
# requires an up-to-date KRL on every bastion and backend.
- name: Deploy KRL
  ansible.builtin.copy:
    src: open-bastion-krl
    dest: /etc/ssh/revoked_keys
    owner: root
    group: root
    mode: '0644'
  when: ob_max_security

- name: Deploy openbastion.conf
  ansible.builtin.template:
    src: openbastion.conf.j2
    dest: /etc/open-bastion/openbastion.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart sshd

# (The /ssh/ca curl shim is gone: the lab SSO now runs the real SSHCA plugin
# — sshCaActivation=1 — so ob-bastion-setup / ob-backend-setup fetch the real
# CA public key from the portal, exercising the production path.)
- name: Dispatch role-specific tasks
  ansible.builtin.include_tasks: "{{ ob_role }}.yml"

- name: "LAB: drop any stale curl shim from a previous lab generation"
  ansible.builtin.file:
    path: /usr/local/sbin/curl
    state: absent

# LAB POST-EDIT: when ob_auto_setup is skipped, wire NSS directly so that
# `getent passwd <sso-user>` resolves via libnss_openbastion + the enrolled
# access token. This mirrors ob-*-setup's configure_nss() WITHOUT applying the
# production SSH/PAM lockdown that would lock out the local management user.
- name: "LAB: write /etc/open-bastion/nss_openbastion.conf"
  ansible.builtin.copy:
    dest: /etc/open-bastion/nss_openbastion.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # LemonLDAP::NG NSS module configuration (lab, generated by Ansible)
      portal_url = {{ ob_portal_url }}
      server_token_file = /etc/open-bastion/token
      cache_enabled = true
      cache_ttl = 300
      verify_ssl = false
      min_uid = 10000
      max_uid = 60000
      min_gid = 10000
      max_gid = 60000
      default_shell = /bin/bash
      home_base = /home
      default_gid = 100
  when: ob_lab_configure_nss | default(false) | bool

- name: "LAB: add openbastion to the passwd line in /etc/nsswitch.conf"
  ansible.builtin.replace:
    path: /etc/nsswitch.conf
    regexp: '^(passwd:\s+(?!.*\bopenbastion\b).*?files)(.*)$'
    replace: '\1 openbastion\2'
  when: ob_lab_configure_nss | default(false) | bool

- name: "LAB: add openbastion to the group line in /etc/nsswitch.conf"
  ansible.builtin.replace:
    path: /etc/nsswitch.conf
    regexp: '^(group:\s+(?!.*\bopenbastion\b).*?files)(.*)$'
    replace: '\1 openbastion\2'
  when: ob_lab_configure_nss | default(false) | bool

- name: "LAB: restart nscd so the NSS module is reloaded"
  ansible.builtin.systemd_service:
    name: nscd
    state: restarted
  failed_when: false
  when: ob_lab_configure_nss | default(false) | bool

# The ob-heartbeat.timer is the heart of the token-lifecycle fix: it runs
# ob-heartbeat every 5 minutes to renew the short-lived access token from the
# long-lived OFFLINE refresh token, so NSS resolution never lapses overnight.
# The package enables it; ensure it is also started now.
- name: "Ensure ob-heartbeat.timer is enabled and running"
  ansible.builtin.systemd_service:
    name: ob-heartbeat.timer
    enabled: true
    state: started
    daemon_reload: true